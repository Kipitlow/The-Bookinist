name: PR State Manager

on:
  pull_request:
    types: [opened, ready_for_review, review_requested, labeled]

jobs:
  state:
    runs-on: ubuntu-latest

    steps:
      - name: Manage PR state
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            const labels = pr.labels.map(l => l.name);

            const qaLabel = labels.includes("qa");
            const readyLabel = labels.includes("ready");

            // 🔁 Draft → Ready
            if (context.payload.action === "ready_for_review") {
              console.log("PR marked as ready");
            }

            // 🧪 Move to QA if label added
            if (qaLabel) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: "open"
              });
            }
