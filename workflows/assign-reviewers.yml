name: Auto Assign Reviewers

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  assign:
    runs-on: ubuntu-latest

    steps:
      - name: Assign tech + QA (round robin)
        uses: actions/github-script@v7
        with:
          script: |
            const techReviewer = "DivineVoices";

            const qaReviewers = ["ErwanHAMIDA", "TheWanou21"];

            const pr = context.payload.pull_request;

            // 🚫 skip si déjà assigné
            if (pr.requested_reviewers && pr.requested_reviewers.length > 0) {
              console.log("Reviewers already assigned, skipping.");
              return;
            }

            // 🔁 Round robin via issue number (stable distribution)
            const index = pr.number % qaReviewers.length;
            const randomQA = qaReviewers[index];

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              reviewers: [techReviewer, randomQA]
            });
