name: 🐛 Bug report
description: Submit a bug with all necessary information
title: "[PLACE YOU FIND THE ISSUE] Short context about the issue "
labels: ["bug"]

body:
  - type: input
    attributes:
      label: Build version
      description: "Git branch name and Date + hour"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Detailed description
      description: "Full details about the bug"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: |
        Describe the steps to reproduce the bug:
        Step 1:
        Step 2:
        Step 3:
        [...]
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Screen / Video
      description: "Screenshot or video if applicable"
